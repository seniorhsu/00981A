name: Daily Real Estate News

on:
  schedule:
    - cron: '0 23 * * *'   # 台灣時間 07:00（UTC+8 → UTC 23:00 前一天）
  workflow_dispatch:       # 允許手動觸發

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch news and notify Telegram
        run: python fetch_news.py
        env:
          PYTHONIOENCODING: utf-8
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      - name: Save sent_news.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_news.json || true
          if git diff --cached --quiet; then
            echo "sent_news.json 無變更，略過 commit。"
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: 更新 sent_news.json ($DATE)"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then
                pushed=true
                break
              fi
              echo "push 失敗，第 $i 次重試..."
              sleep 5
            done
            $pushed || { echo "❌ 3 次 push 均失敗"; exit 1; }
          fi
