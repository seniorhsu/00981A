name: Download 00981A Holdings

# 台灣時間 16:30–19:00，每 15 分鐘執行一次
# 台灣 UTC+8，換算成 UTC：08:30–11:00
on:
  schedule:
    - cron: '30,45 7 * * 1-5'       # 16:30, 16:45 TST
    - cron: '0,15,30,45 8,9 * * 1-5' # 17:00–18:45 TST
    - cron: '0 10 * * 1-5'           # 19:00 TST
  workflow_dispatch:                 # 允許手動觸發

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run download script
        run: python download_00981A.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit data + log
        if: always()
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 先只 stage 資料檔，判斷是否有新資料
          git add 00981A_Data/ dates.json || true
          if git diff --cached --quiet; then
            echo "new_data=false" >> $GITHUB_OUTPUT
          else
            echo "new_data=true" >> $GITHUB_OUTPUT
          fi

          # 再加入 log，一起 commit（有任何變更才推）
          git add download_log.txt notify_telegram_log.txt || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: 更新 00981A 持股資料 ($DATE)"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=true
                break
              fi
              echo "push 失敗，第 $i 次重試..."
              sleep 5
            done
            $pushed || { echo "❌ 3 次 push 均失敗"; exit 1; }
          fi

      - name: Notify Telegram
        if: steps.commit.outputs.new_data == 'true'
        run: python notify_telegram.py
        env:
          PYTHONIOENCODING: utf-8
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
