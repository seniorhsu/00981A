# 直接 RSS 來源
# filter_by_keywords: true  → 標題需含任一關鍵字才保留（適合財經廣類）
# filter_by_keywords: false → 全部保留（適合房市專屬分類）
rss_feeds:
  - name: Google房市
    url: "https://news.google.com/rss/headlines/section/topic/REAL_ESTATE?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
    filter_by_keywords: true
  - name: Google財經
    url: "https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
    filter_by_keywords: true

