# 每日新聞關鍵字設定檔
# 每個關鍵字會查詢 Google News RSS，抓取當天最新新聞
# 每個關鍵字最多抓 MAX_PER_KEYWORD 則（見 fetch_news.py）

settings:
  max_per_keyword: 999    # 每個關鍵字不限則數
  max_total: 200          # 整份訊息最多幾則（去重後）
  send_hour_tw: 8         # 台灣時間幾點發送（僅供備註，由 workflow 控制）
  news_days: 2            # 抓幾天內的新聞（1=只抓今天，2=今天+昨天）

# 直接 RSS 來源：抓最新文章後，標題含任一關鍵字才保留
rss_feeds:
  - name: 經濟日報
    url: "https://money.udn.com/rssfeed/news/1001/5589?type=rss"
  - name: 自由財經
    url: "https://news.google.com/rss/search?q=%E6%88%BF%E5%B8%82+site:ltn.com.tw&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
  - name: ETtoday房產
    url: "https://news.google.com/rss/search?q=%E6%88%BF%E5%B8%82+site:ettoday.net&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
  - name: 壹蘋新聞
    url: "https://news.google.com/rss/search?q=%E6%88%BF%E5%B8%82+site:nextapple.com&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
  - name: 中央社財經
    url: "https://news.google.com/rss/search?q=%E6%88%BF%E5%B8%82+site:cna.com.tw&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"

