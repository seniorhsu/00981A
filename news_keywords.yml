# 每日新聞關鍵字設定檔
# 每個關鍵字會查詢 Google News RSS，抓取當天最新新聞
# 每個關鍵字最多抓 MAX_PER_KEYWORD 則（見 fetch_news.py）

settings:
  max_per_keyword: 3      # 每個關鍵字最多幾則
  max_total: 15           # 整份訊息最多幾則（去重後）
  send_hour_tw: 8         # 台灣時間幾點發送（僅供備註，由 workflow 控制）

keywords:
  房市行情:
    - 房價
    - 房市
    - 中古屋
    - 新成屋
    - 坪數
    - 成交價
    - 實價登錄

  預售屋:
    - 預售屋
    - 建案
    - 預售案
    - 換約
    - 解約
    - 紅單

  不動產與土地:
    - 不動產
    - 土地
    - 地價
    - 容積率
    - 都更
    - 危老
    - 重劃區
    - 地上權

  稅務:
    - 房地合一稅
    - 地價稅
    - 房屋稅
    - 囤房稅
    - 土地增值稅
    - 契稅

  政策與法規:
    - 打房
    - 限貸
    - 信用管制
    - 平均地權條例
    - 社會住宅
    - 社宅
    - 租金補貼
    - 房貸利率

  建商與市場:
    - 建商
    - 代銷
    - 豪宅
    - 法拍屋
    - 銀拍屋
