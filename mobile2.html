<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>00981A 個股持股查詢</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --bg2:       #ffffff;
      --bg3:       #f1f5f9;
      --border:    #cbd5e1;
      --text:      #0f172a;
      --muted:     #475569;
      --accent:    #1d4ed8;
      --green:     #15803d;
      --green-bg:  #dcfce7;
      --green-bd:  #86efac;
      --red:       #b91c1c;
      --red-bg:    #fee2e2;
      --red-bd:    #fca5a5;
      --gray:      #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .topbar-row1 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .etf-badge {
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      border-radius: 6px;
      padding: 3px 9px;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }

    /* ── Search row ── */
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .code-input {
      flex: 1;
      background: var(--bg3);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      outline: none;
      letter-spacing: 1px;
    }
    .code-input:focus { border-color: var(--accent); background: #fff; }
    .code-input::placeholder { color: #aab4c4; font-weight: 400; letter-spacing: 0; font-size: 14px; }
    .search-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-btn:active { opacity: 0.85; }

    /* ── Date range row ── */
    .range-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .range-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    .quick-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .qbtn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .qbtn.active, .qbtn:active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Stock info banner ── */
    .stock-banner {
      margin: 12px 14px 0;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .stock-banner-id { display: flex; align-items: baseline; gap: 8px; }
    .stock-code { font-family: 'Courier New', monospace; font-size: 20px; font-weight: 900; color: var(--accent); }
    .stock-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .stock-range { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.5; }

    /* ── Mini chart bars ── */
    .chart-wrap {
      margin: 10px 14px 4px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 8px;
    }
    .chart-title { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 60px;
    }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 3px;
      transition: opacity 0.15s;
      cursor: pointer;
    }
    .bar:hover { opacity: 0.75; }
    .bar.bar-up   { background: var(--green); }
    .bar.bar-down { background: var(--red); }
    .bar.bar-same { background: var(--gray); }
    .bar.bar-new  { background: var(--accent); }
    .bar.bar-out  { background: #f59e0b; }
    .chart-bottom { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--muted); }

    /* ── Summary row ── */
    .summary-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .summary-row::-webkit-scrollbar { display: none; }
    .sum-chip {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: center;
    }
    .sum-chip .sv { font-size: 17px; font-weight: 800; }
    .sum-chip .sl { font-size: 11px; color: var(--muted); font-weight: 500; }
    .sum-chip.sc-latest .sv { color: var(--accent); }
    .sum-chip.sc-peak   .sv { color: var(--green); }
    .sum-chip.sc-low    .sv { color: var(--red); }
    .sum-chip.sc-chg    .sv { color: var(--text); }

    /* ── Result list ── */
    .result-wrap { padding: 6px 14px 0; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .entry {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .entry.e-up   { border-left: 4px solid var(--green); background: #f8fff9; }
    .entry.e-down { border-left: 4px solid var(--red);   background: #fff8f8; }
    .entry.e-same { border-left: 4px solid var(--gray);  }
    .entry.e-new  { border-left: 4px solid var(--accent); background: #f0f6ff; }
    .entry.e-out  { border-left: 4px solid #f59e0b; background: #fffbf0; }

    .entry-date {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      min-width: 72px;
    }
    .entry-shares {
      flex: 1;
      text-align: right;
      font-size: 17px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      color: var(--text);
    }
    .entry-shares.e-none { color: var(--gray); font-size: 14px; }
    .entry-chg {
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      min-width: 80px;
    }
    .chg-up   { color: var(--green); }
    .chg-down { color: var(--red); }
    .chg-zero { color: var(--gray); }
    .chg-new  { color: var(--accent); font-size: 12px; }
    .chg-out  { color: #d97706; font-size: 12px; }

    .entry-bar {
      width: 4px;
      border-radius: 2px;
      align-self: stretch;
      min-height: 20px;
      flex-shrink: 0;
    }

    /* ── States ── */
    .empty   { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 15px; line-height: 1.7; }
    .loading { padding: 50px 20px; text-align: center; color: var(--muted); }
    .error   { color: var(--red); padding: 16px; line-height: 1.7; font-size: 14px; }

    .autocomplete-box {
      position: absolute;
      background: var(--bg2);
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 200;
      max-height: 200px;
      overflow-y: auto;
      left: 0; right: 80px;
      top: 100%;
      margin-top: 2px;
    }
    .ac-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.selected { background: var(--bg3); }
    .ac-code { font-family: 'Courier New', monospace; font-weight: 800; color: var(--accent); min-width: 50px; }
    .ac-name { color: var(--text); font-weight: 500; }

    .search-relative { position: relative; flex: 1; }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-row1">
    <div class="etf-badge">00981A</div>
    <div class="topbar-title">個股持股期間查詢</div>
  </div>

  <div class="search-row">
    <div class="search-relative">
      <input class="code-input" id="codeInput" type="text" inputmode="numeric"
             placeholder="輸入股票代號或名稱" autocomplete="off"
             oninput="onCodeInput()" onkeydown="onCodeKeydown(event)">
      <div class="autocomplete-box" id="acBox" style="display:none"></div>
    </div>
    <button class="search-btn" onclick="doSearch()">查詢</button>
  </div>

  <div class="range-row">
    <span class="range-label">期間</span>
    <div class="quick-btns">
      <button class="qbtn" id="qbtn-1m" onclick="setRange('1m',this)">近一個月</button>
      <button class="qbtn" id="qbtn-3m" onclick="setRange('3m',this)">近三個月</button>
      <button class="qbtn" id="qbtn-6m" onclick="setRange('6m',this)">近六個月</button>
      <button class="qbtn active" id="qbtn-all" onclick="setRange('all',this)">全部</button>
    </div>
    <select id="selFrom" onchange="onManualRange()"></select>
    <span class="range-label">至</span>
    <select id="selTo" onchange="onManualRange()"></select>
  </div>
</div>

<!-- ── Content ── -->
<div id="mainContent">
  <div class="empty">請輸入股票代號或名稱進行查詢</div>
</div>

<script>
// ── Force fresh for LINE browser ──────────────────────────────────────────
(function() {
  const p = new URLSearchParams(location.search);
  if (!p.has('v')) location.replace(location.pathname + '?v=' + Date.now());
})();

// ── Dates（動態從 dates.json 載入）────────────────────────────────────────
let DATES = [];

async function loadDates() {
  try {
    const resp = await fetch(`dates.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) throw new Error();
    DATES = (await resp.json()).sort();
    return true;
  } catch {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty">無法載入 dates.json，請確認檔案存在。</div>';
    return false;
  }
}

// ── State ─────────────────────────────────────────────────────────────────
const cache = {};          // date -> parsed holdings array
let stockIndex = {};       // code -> name  (built from latest file)
let currentCode = null;
let fromDate = null;
let toDate   = null;
let activeRange = 'all';
let acSelected  = -1;

// ── Helpers ───────────────────────────────────────────────────────────────
const fmtDate  = d => `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
const fmtShort = d => `${d.slice(4,6)}/${d.slice(6,8)}`;

function parseHoldings(text) {
  return text.trim().split('\n').slice(1).map(line => {
    const p = line.trim().split(',');
    return {
      code:   p[0]?.trim(),
      name:   p[1]?.trim(),
      weight: parseFloat(p[2]?.replace('%','')) || 0,
      shares: parseInt(p[3]?.replace(/,/g,'')) || 0
    };
  }).filter(r => r.code);
}

async function loadFile(date) {
  if (cache[date]) return cache[date];
  const resp = await fetch(`00981A_Data/00981A_${date}.txt?t=${Date.now()}`, { cache: 'no-store' });
  if (!resp.ok) throw new Error(`無法讀取 ${date}`);
  const data = parseHoldings(await resp.text());
  cache[date] = data;
  return data;
}

// ── Build stock index from latest file ────────────────────────────────────
async function buildIndex() {
  try {
    const latest = await loadFile(DATES[DATES.length - 1]);
    stockIndex = Object.fromEntries(latest.map(r => [r.code, r.name]));
  } catch(e) {}
}

// ── Populate date selects ──────────────────────────────────────────────────
function populateDateSelects() {
  const selF = document.getElementById('selFrom');
  const selT = document.getElementById('selTo');
  DATES.forEach(d => {
    selF.appendChild(new Option(fmtDate(d), d));
    selT.appendChild(new Option(fmtDate(d), d));
  });
  selF.value = fromDate;
  selT.value = toDate;
}

// ── Range presets ─────────────────────────────────────────────────────────
function setRange(mode, btn) {
  activeRange = mode;
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const latest = new Date(+toDate.slice(0,4), +toDate.slice(4,6)-1, +toDate.slice(6,8));
  let cutoff = new Date(latest);
  if (mode === '1m') cutoff.setMonth(cutoff.getMonth() - 1);
  else if (mode === '3m') cutoff.setMonth(cutoff.getMonth() - 3);
  else if (mode === '6m') cutoff.setMonth(cutoff.getMonth() - 6);
  else { fromDate = DATES[0]; document.getElementById('selFrom').value = fromDate; if (currentCode) doSearch(); return; }

  const cutMs = cutoff.getTime();
  const nearest = DATES.reduce((best, d) => {
    const dt = new Date(+d.slice(0,4), +d.slice(4,6)-1, +d.slice(6,8));
    const bd = new Date(+best.slice(0,4), +best.slice(4,6)-1, +best.slice(6,8));
    return Math.abs(dt - cutMs) < Math.abs(bd - cutMs) ? d : best;
  }, DATES[0]);
  fromDate = nearest;
  document.getElementById('selFrom').value = fromDate;
  if (currentCode) doSearch();
}

function onManualRange() {
  fromDate = document.getElementById('selFrom').value;
  toDate   = document.getElementById('selTo').value;
  activeRange = '';
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  if (currentCode) doSearch();
}

// ── Autocomplete ──────────────────────────────────────────────────────────
function onCodeInput() {
  const val = document.getElementById('codeInput').value.trim();
  acSelected = -1;
  if (!val) { closeAc(); return; }
  const lower = val.toLowerCase();
  const matches = Object.entries(stockIndex)
    .filter(([code, name]) => code.includes(val) || name.toLowerCase().includes(lower))
    .slice(0, 8);
  if (!matches.length) { closeAc(); return; }
  const box = document.getElementById('acBox');
  box.innerHTML = matches.map(([code, name], i) =>
    `<div class="ac-item" data-code="${code}" onclick="selectAc('${code}')">
       <span class="ac-code">${code}</span><span class="ac-name">${name}</span>
     </div>`
  ).join('');
  box.style.display = 'block';
}

function onCodeKeydown(e) {
  const box  = document.getElementById('acBox');
  const items = box.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    acSelected = Math.min(acSelected + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelected));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acSelected = Math.max(acSelected - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acSelected));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (acSelected >= 0 && items[acSelected]) {
      selectAc(items[acSelected].dataset.code);
    } else {
      doSearch();
    }
  } else if (e.key === 'Escape') {
    closeAc();
  }
}

function selectAc(code) {
  document.getElementById('codeInput').value = code;
  closeAc();
  doSearch();
}

function closeAc() {
  document.getElementById('acBox').style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-relative')) closeAc();
});

// ── Search ────────────────────────────────────────────────────────────────
async function doSearch() {
  closeAc();
  const raw  = document.getElementById('codeInput').value.trim();
  if (!raw) return;

  // Support name search -> resolve to code
  let code = raw;
  if (!/^\d+$/.test(raw)) {
    const lower = raw.toLowerCase();
    const found = Object.entries(stockIndex).find(([c, n]) => n.toLowerCase().includes(lower));
    if (found) code = found[0];
    else { showError(`找不到「${raw}」，請確認代號或名稱`); return; }
  }

  currentCode = code;
  const dates = DATES.filter(d => d >= fromDate && d <= toDate);
  if (!dates.length) { showError('所選期間無資料'); return; }

  showLoading();

  try {
    // Load all files in range
    const results = await Promise.all(dates.map(async d => {
      const holdings = await loadFile(d);
      const row = holdings.find(r => r.code === code);
      return { date: d, shares: row ? row.shares : null, name: row?.name };
    }));

    const name = results.find(r => r.name)?.name || stockIndex[code] || code;
    renderResult(code, name, results);
  } catch(e) {
    showError(`載入失敗：${e.message}`);
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderResult(code, name, results) {
  // Compute changes
  const entries = results.map((r, i) => {
    const prev = results[i - 1];
    let type, diff = null;
    if (r.shares === null && (prev?.shares ?? null) !== null) type = 'out';
    else if (r.shares !== null && (prev?.shares ?? null) === null) type = 'new';
    else if (r.shares === null) type = 'out';
    else {
      diff = r.shares - (prev?.shares ?? r.shares);
      type = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
    }
    return { ...r, type, diff };
  });

  // Stats
  const withShares = entries.filter(e => e.shares !== null);
  const latest  = withShares[withShares.length - 1]?.shares ?? null;
  const peak    = withShares.length ? Math.max(...withShares.map(e => e.shares)) : null;
  const low     = withShares.length ? Math.min(...withShares.map(e => e.shares)) : null;
  const first   = withShares[0]?.shares ?? null;
  const totalChg = latest !== null && first !== null ? latest - first : null;

  // Show newest first
  const display = [...entries].reverse();

  // Chart: sample up to 40 bars
  const chartData = entries.filter(e => e.shares !== null);
  const step = Math.max(1, Math.floor(chartData.length / 40));
  const sampled = chartData.filter((_, i) => i % step === 0 || i === chartData.length - 1);
  const maxShares = peak || 1;
  const chartBars = sampled.map(e => {
    const pct = Math.max(4, Math.round((e.shares / maxShares) * 100));
    return `<div class="bar-wrap"><div class="bar bar-${e.type}" style="height:${pct}%" title="${fmtDate(e.date)}: ${e.shares.toLocaleString()}張"></div></div>`;
  }).join('');
  const chartFirst = sampled[0] ? fmtShort(sampled[0].date) : '';
  const chartLast  = sampled[sampled.length-1] ? fmtShort(sampled[sampled.length-1].date) : '';

  const fmtChg = (v) => {
    if (v == null) return '';
    if (v === 0) return '<span class="chg-zero">—</span>';
    const cls = v > 0 ? 'chg-up' : 'chg-down';
    return `<span class="${cls}">${v>0?'+':''}${v.toLocaleString()}</span>`;
  };
  const fmtTypeLabel = t => {
    if (t === 'new') return '<span class="chg-new">新增持股</span>';
    if (t === 'out') return '<span class="chg-out">完全出清</span>';
    return '';
  };

  const html = `
    <div class="stock-banner">
      <div class="stock-banner-id">
        <span class="stock-code">${code}</span>
        <span class="stock-name">${name}</span>
      </div>
      <div class="stock-range">
        ${fmtDate(fromDate)}<br>至 ${fmtDate(toDate)}
      </div>
    </div>

    ${chartBars ? `<div class="chart-wrap">
      <div class="chart-title">持股股數走勢</div>
      <div class="chart-bars">${chartBars}</div>
      <div class="chart-bottom"><span>${chartFirst}</span><span>${chartLast}</span></div>
    </div>` : ''}

    <div class="summary-row">
      <div class="sum-chip sc-latest">
        <div class="sv">${latest != null ? latest.toLocaleString() : '—'}</div>
        <div class="sl">最新股數</div>
      </div>
      <div class="sum-chip sc-chg">
        <div class="sv">${totalChg != null ? (totalChg >= 0 ? '+' : '') + totalChg.toLocaleString() : '—'}</div>
        <div class="sl">期間總變化</div>
      </div>
      <div class="sum-chip sc-peak">
        <div class="sv">${peak != null ? peak.toLocaleString() : '—'}</div>
        <div class="sl">期間最高</div>
      </div>
      <div class="sum-chip sc-low">
        <div class="sv">${low != null ? low.toLocaleString() : '—'}</div>
        <div class="sl">期間最低</div>
      </div>
    </div>

    <div class="result-wrap">
      <div class="result-header">
        <span>共 ${entries.length} 個交易日</span>
        <span>最新在上</span>
      </div>
      ${display.map(e => `
        <div class="entry e-${e.type}">
          <div class="entry-date">${fmtDate(e.date)}</div>
          <div class="entry-shares ${e.shares===null?'e-none':''}">${e.shares!==null ? e.shares.toLocaleString() : '未持有'}</div>
          <div class="entry-chg">
            ${e.type === 'new' || e.type === 'out' ? fmtTypeLabel(e.type) : fmtChg(e.diff)}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

function showLoading() {
  document.getElementById('mainContent').innerHTML = '<div class="loading">查詢中…</div>';
}
function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="error">${msg}</div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  const ok = await loadDates();
  if (!ok || !DATES.length) return;
  fromDate = DATES[0];
  toDate   = DATES[DATES.length - 1];
  populateDateSelects();
  buildIndex();
})();
</script>
</body>
</html>
